<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tổng Kho Gạch Minh Chiến</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #e2e8f0);
      color: #0f172a;
    }
    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 16px;
    }
    .header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2563eb, #4338ca);
      color: white;
      font-weight: 700;
      font-size: 22px;
      box-shadow: 0 10px 20px rgba(37,99,235,0.25);
    }
    .title { font-size: 28px; font-weight: 700; margin: 0; }
    .subtitle { margin: 4px 0 0; color: #475569; font-size: 14px; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 12px 24px rgba(15,23,42,0.08);
      border: 1px solid #e2e8f0;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .row { display: flex; gap: 10px; }
    .btn-primary {
      margin-top: 6px;
      width: 100%;
      padding: 12px;
      border-radius: 18px;
      font-weight: 700;
      color: white;
      background: linear-gradient(to right, #2563eb, #4338ca);
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.95; }
    .result {
      margin-top: 12px;
      font-weight: 600;
      line-height: 1.6;
    }
    .product-image {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 10px;
      object-fit: contain; /* sửa: không zoom nữa */
      max-height: 220px;
      background: white;
      padding: 8px; /* thêm khoảng trống cho đẹp */
    }
    .muted { color: #64748b; }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="icon">MC</div>
      <div>
        <h1 class="title">Tổng Kho Gạch Minh Chiến</h1>
        <p class="subtitle">Tra giá nhanh theo mã và tính số lượng</p>
      </div>
    </div>

    <div class="card">
      <label for="codeInput">Nhập mã gạch</label>
      <input id="codeInput" placeholder="Ví dụ: A12X" />
      <button class="btn-primary" onclick="searchCode()">Tra giá</button>
      <div class="status" id="sheetStatus">Đang kết nối Google Sheet...</div>
      <div class="result" id="result1"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Tính nhanh số lượng</h3>

      <label for="area2">Diện tích (m²)</label>
      <input type="number" id="area2" placeholder="Ví dụ: 32" />

      <label>Kích thước gạch (cm)</label>
      <div class="row">
        <input type="number" id="length2" placeholder="Dài" />
        <input type="number" id="width2" placeholder="Rộng" />
      </div>

      <label for="waste2">% trừ hao</label>
      <input type="number" id="waste2" value="5" />

      <label for="price2">Giá / m²</label>
      <input type="number" id="price2" placeholder="Tự động điền sau khi tra mã" />

      <button class="btn-primary" onclick="calculate2()">Tính</button>
      <div class="result" id="result2"></div>
    </div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1K17MCPHqVPgufMEUFHXPB9SZOFR5o6sdRWHsC9lraeU/gviz/tq?tqx=out:csv&gid=0";

    let productData = {};
    let sheetLoaded = false;

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function csvToData(text) {
      const lines = text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      if (lines.length < 2) return {};

      const headers = parseCsvLine(lines[0]).map((item) => item.toLowerCase());
      const codeIndex = headers.indexOf("code");
      const nameIndex = headers.indexOf("name");
      const priceIndex = headers.indexOf("price");
      const stockIndex = headers.indexOf("stock");
      const imageIndex = headers.indexOf("image");

      if (codeIndex === -1) return {};

      const mapped = {};

      lines.slice(1).forEach((line) => {
        const cols = parseCsvLine(line);
        const code = (cols[codeIndex] || "").trim().toUpperCase();
        if (!code) return;

        mapped[code] = {
          code: code,
          name: cols[nameIndex] || "Chưa có tên sản phẩm",
          priceText: cols[priceIndex] || "Liên hệ",
          priceNumber: Number(String(cols[priceIndex] || "").replace(/[^0-9]/g, "")) || 0,
          stock: cols[stockIndex] || "Đang cập nhật",
          image: cols[imageIndex] || ""
        };
      });

      return mapped;
    }

    function extractSizeFromName(name) {
      const match = String(name || "").match(/(\d{2,3})\s*[xX]\s*(\d{2,3})/);
      if (!match) return null;
      return {
        length: Number(match[1]),
        width: Number(match[2])
      };
    }

    async function loadSheet() {
      if (sheetLoaded) return;

      const status = document.getElementById("sheetStatus");
      status.textContent = "Đang kết nối Google Sheet...";

      try {
        const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("Load failed");

        const text = await response.text();
        productData = csvToData(text);
        sheetLoaded = true;

        if (Object.keys(productData).length > 0) {
          status.textContent = "Đã tải dữ liệu từ Google Sheet.";
        } else {
          status.textContent = "Không thấy dữ liệu hợp lệ trong Google Sheet.";
        }
      } catch (error) {
        status.textContent = "Không tải được Google Sheet. Kiểm tra lại quyền chia sẻ sheet.";
      }
    }

    async function searchCode() {
      await loadSheet();

      const code = document.getElementById("codeInput").value.trim().toUpperCase();
      const result = document.getElementById("result1");

      if (!code) {
        result.innerHTML = "";
        return;
      }

      const product = productData[code];

      if (!product) {
        result.innerHTML = "Không tìm thấy mã";
        return;
      }

      document.getElementById("price2").value = product.priceNumber || "";

      const size = extractSizeFromName(product.name);
      if (size) {
        document.getElementById("length2").value = size.length;
        document.getElementById("width2").value = size.width;
      }

      const imageHtml = product.image
        ? '<img class="product-image" src="' + product.image + '" alt="' + product.name + '" onerror="this.style.display=\'none\'">'
        : "";

      result.innerHTML =
        imageHtml +
        '<br>Mã: ' + product.code +
        '<br>Tên: ' + product.name +
        '<br>Giá: ' + product.priceText +
        '<br>Tồn kho: ' + product.stock;
    }

    function calculate2() {
      const area = Number(document.getElementById("area2").value);
      const length = Number(document.getElementById("length2").value);
      const width = Number(document.getElementById("width2").value);
      const waste = Number(document.getElementById("waste2").value) || 0;
      const price = Number(document.getElementById("price2").value);

      if (!area || !length || !width || !price) {
        document.getElementById("result2").innerHTML = "Vui lòng nhập đủ diện tích, kích thước và giá.";
        return;
      }

      const tileArea = (length / 100) * (width / 100);
      if (!tileArea) {
        document.getElementById("result2").innerHTML = "Kích thước gạch không hợp lệ.";
        return;
      }

      const totalArea = area * (1 + waste / 100);
      const tilesNeeded = Math.ceil(totalArea / tileArea);
      const totalPrice = totalArea * price;

      document.getElementById("result2").innerHTML =
        'Số viên: ' + tilesNeeded +
        '<br>Diện tích: ' + totalArea.toFixed(2) + ' m²' +
        '<br>Tiền: ' + totalPrice.toLocaleString("vi-VN") + ' VND';
    }

    document.getElementById("codeInput").addEventListener("input", function () {
      searchCode();
    });

    loadSheet();
  </script>
</body>
</html>
